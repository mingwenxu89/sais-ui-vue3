<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dropGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="leafL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="leafR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>

  <!-- Water drop -->
  <path d="M32 5C32 5 9 28 9 42a23 23 0 0 0 46 0C55 28 32 5 32 5Z" fill="url(#dropGrad)"/>

  <!-- Highlight glare on drop -->
  <ellipse cx="24" cy="30" rx="5" ry="9" fill="white" opacity="0.12" transform="rotate(-20,24,30)"/>

  <!-- Plant stem -->
  <line x1="32" y1="56" x2="32" y2="33" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M32 47C28 42 18 40 16 30C25 33 31 46 32 47Z" fill="url(#leafL)"/>

  <!-- Right leaf -->
  <path d="M32 40C36 35 46 32 48 22C39 25 33 39 32 40Z" fill="url(#leafR)"/>

  <!-- Sprout bud at top of stem -->
  <ellipse cx="32" cy="32" rx="3.5" ry="5" fill="#C8E6C9" transform="rotate(-10,32,32)"/>

  <!-- Three water droplets spraying (smart irrigation) -->
  <circle cx="20" cy="17" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="32" cy="17" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="44" cy="17" r="2.2" fill="white" opacity="0.55"/>
</svg>
